<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven Wexley</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a001f, #2a0033);
            color: white;
            text-align: center;
            min-height: 100vh;
        }
        .container {
            max-width: 420px;
            margin: 40px auto;
            padding: 20px;
        }
        .profile-pic {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 6px solid #c026d3;
            box-shadow: 0 0 30px #c026d3;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            margin: 10px 0 8px;
            font-size: 32px;
            text-shadow: 0 0 15px #c026d3;
        }
        .verified {
            background: #22c55e;
            color: black;
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 9999px;
            display: inline-block;
            box-shadow: 0 0 10px #22c55e;
        }
        p {
            opacity: 0.9;
            line-height: 1.6;
            margin: 16px 0 30px;
        }
        .main-btn {
            display: block;
            background: linear-gradient(90deg, #c026d3, #7c3aed);
            color: white;
            padding: 20px 30px;
            margin: 20px auto;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 30px #c026d3;
            transition: all 0.3s;
        }
        .main-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px #c026d3;
        }
        .btn-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            vertical-align: middle;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://imgur.com/a/uLNn9sf" alt="Raven Wexley" class="profile-pic">
        
        <h1>Raven Wexley <span class="verified">✓</span></h1>
        <p>20 • Alt college girl 🖤</p>
        
        <!-- BIG MAIN BUTTON WITH IMAGE -->
        <a href="https://fanvue.com/ravenwexley" class="main-btn">
            <img src="https://imgur.com/a/3ckPXy8" class="btn-image" alt="Raven">
            free exclusive ;)
        </a>
        
        <a href="https://instagram.com/ravenwexley" class="main-btn">Instagram</a>
    </div>
</body>
</html>
